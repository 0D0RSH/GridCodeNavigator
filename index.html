<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <title>VITE + REACT</title>
  <script defer src="sensors.js"></script>
  <style>
    html, body, #root {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #tracking-button-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }

    #tracking-button {
      padding: 8px 16px;
      font-size: 14px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #tracking-button:hover {
      background-color: #3367d6;
    }
  </style>

</head>
<body>
<div id="root"></div>
<div id="tracking-button-container">
  <button id="tracking-button" onclick="requestPermissions()">Enable Tracking</button>
</div>
<script type="module" src="/src/main.jsx"></script>
<script src="js/beacon.js"></script>
</body>
</html>
